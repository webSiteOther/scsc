<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Scientific Center | نظام إدارة المركز العلمي</title>
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts - Cairo (Arabic Support) + Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --dark-blue: #1a2a6c;
            --medium-blue: #2a4a9c;
            --primary-blue: #3c6ec8;
            --light-blue: #4a8fe0;
            --gold: #f4a261;
            --gold-dark: #e76f51;
            --white: #ffffff;
            --light-gray: #f8f9fa;
            --gray: #6c757d;
            --danger: #e74c3c;
            --success: #2ecc71;
        }

        body {
            font-family: 'Cairo', 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--dark-blue) 0%, var(--medium-blue) 50%, var(--light-blue) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" opacity="0.05"><path fill="white" d="M20,20 L80,20 L80,80 L20,80 Z"/><circle cx="50" cy="50" r="10" fill="white"/><path d="M30,30 L70,30 M30,50 L70,50 M30,70 L70,70" stroke="white" stroke-width="2"/></svg>');
            background-repeat: repeat;
            background-size: 40px;
            pointer-events: none;
        }

        .shape {
            position: absolute;
            background: rgba(255,255,255,0.03);
            border-radius: 50%;
            animation: float 20s infinite ease-in-out;
            pointer-events: none;
        }

        .shape-1 { width: 300px; height: 300px; top: -100px; right: -100px; animation-duration: 25s; }
        .shape-2 { width: 200px; height: 200px; bottom: -50px; left: -80px; animation-duration: 18s; animation-delay: -5s; }
        .shape-3 { width: 150px; height: 150px; top: 40%; left: 20%; animation-duration: 22s; animation-delay: -10s; }
        .shape-4 { width: 250px; height: 250px; bottom: 20%; right: 10%; animation-duration: 28s; animation-delay: -3s; }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-30px) rotate(10deg); }
        }

        .login-container {
            width: 100%;
            max-width: 460px;
            margin: 20px;
            position: relative;
            z-index: 10;
        }

        .login-card {
            background: var(--white);
            border-radius: 32px;
            padding: 45px 40px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.25);
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo-section {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-icon {
            width: 85px;
            height: 85px;
            background: linear-gradient(135deg, var(--dark-blue), var(--primary-blue));
            border-radius: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            box-shadow: 0 10px 25px rgba(26,42,108,0.3);
        }

        .logo-icon i {
            font-size: 45px;
            color: var(--gold);
        }

        .logo-section h1 {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--dark-blue), var(--primary-blue));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 5px;
        }

        .logo-section .subtitle {
            color: var(--gray);
            font-size: 13px;
            letter-spacing: 1px;
        }

        .logo-section .arabic-name {
            font-size: 14px;
            color: var(--gold);
            font-weight: 600;
            margin-top: 5px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }

        .form-group label i {
            color: var(--primary-blue);
            margin-left: 8px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--gray);
            font-size: 18px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 45px 14px 18px;
            border: 2px solid #e9ecef;
            border-radius: 16px;
            font-size: 15px;
            font-family: inherit;
            transition: all 0.3s;
            background: var(--white);
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary-blue);
            box-shadow: 0 0 0 4px rgba(60,110,200,0.15);
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--primary-blue), var(--medium-blue));
            color: var(--white);
            border: none;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-family: inherit;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(42,74,156,0.35);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .demo-credentials {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #e9ecef;
        }

        .demo-title {
            text-align: center;
            font-size: 12px;
            color: var(--gray);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .demo-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .demo-item {
            background: var(--light-gray);
            border-radius: 12px;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .demo-item:hover {
            background: #e9ecef;
            transform: scale(1.02);
        }

        .demo-role {
            font-size: 11px;
            color: var(--gold);
            font-weight: 600;
        }

        .demo-user {
            font-size: 12px;
            font-weight: 600;
            color: var(--dark-blue);
        }

        .demo-pass {
            font-size: 10px;
            color: var(--gray);
            font-family: monospace;
        }

        .error-message {
            background: #fdecea;
            color: var(--danger);
            padding: 12px 15px;
            border-radius: 14px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 13px;
            border-right: 4px solid var(--danger);
            display: none;
            align-items: center;
            gap: 10px;
            justify-content: center;
        }

        .error-message.show {
            display: flex;
        }

        .loading {
            display: none;
            text-align: center;
            margin-top: 15px;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            width: 24px;
            height: 24px;
            border: 3px solid #e9ecef;
            border-top-color: var(--primary-blue);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            font-size: 11px;
            color: rgba(255,255,255,0.6);
            position: relative;
            z-index: 10;
        }

        @media (max-width: 500px) {
            .login-card {
                padding: 30px 25px;
            }
            .logo-icon {
                width: 70px;
                height: 70px;
            }
            .logo-icon i {
                font-size: 35px;
            }
            .logo-section h1 {
                font-size: 24px;
            }
            .demo-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Toast Notifications */
        .toast-container {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .toast {
            padding: 14px 24px;
            border-radius: 14px;
            color: white;
            font-size: 14px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: toastIn 0.3s ease, toastOut 0.3s ease 3.7s forwards;
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
            max-width: 400px;
            font-family: inherit;
        }
        .toast-success { background: linear-gradient(135deg, #2ecc71, #27ae60); }
        .toast-error { background: linear-gradient(135deg, #e74c3c, #c0392b); }
        .toast-warning { background: linear-gradient(135deg, #f39c12, #e67e22); }
        .toast-info { background: linear-gradient(135deg, #3498db, #2980b9); }
        @keyframes toastIn { from { opacity: 0; transform: translateX(-30px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes toastOut { from { opacity: 1; } to { opacity: 0; transform: translateX(-30px); } }
    </style>
</head>
<body>
    <div class="toast-container" id="toastContainer"></div>

    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
    <div class="shape shape-3"></div>
    <div class="shape shape-4"></div>

    <div class="login-container">
        <div class="login-card">
            <div class="logo-section">
                <div class="logo-icon">
                    <i class="fas fa-graduation-cap"></i>
                </div>
                <h1>Scientific Center</h1>
                <div class="subtitle">COURSE MANAGEMENT SYSTEM</div>
                <div class="arabic-name">المركز العلمي لإدارة الكورسات</div>
            </div>

            <div id="errorMessage" class="error-message">
                <i class="fas fa-exclamation-triangle"></i>
                <span id="errorText">Invalid username or password</span>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label><i class="fas fa-user"></i> اسم المستخدم</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user"></i>
                        <input type="text" id="username" placeholder="أدخل اسم المستخدم" autocomplete="off" required>
                    </div>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-lock"></i> كلمة المرور</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" placeholder="أدخل كلمة المرور" required>
                    </div>
                </div>

                <button type="submit" class="login-btn" id="loginBtn">
                    <i class="fas fa-sign-in-alt"></i>
                    <span>دخول</span>
                </button>

                <div id="loading" class="loading">
                    <div class="spinner"></div>
                    <p style="margin-top: 8px; font-size: 12px; color: var(--gray);">جاري التحقق...</p>
                </div>
            </form>

            <div class="demo-credentials">
                <div class="demo-title">
                    <i class="fas fa-users" style="color: var(--gold);"></i>
                    <span>بيانات الدخول التجريبية</span>
                    <i class="fas fa-key" style="color: var(--gold);"></i>
                </div>
                <div class="demo-grid">
                    <div class="demo-item" onclick="fillCredentials('admin', 'admin123')">
                        <div class="demo-role"><i class="fas fa-crown"></i> مدير النظام</div>
                        <div class="demo-user">admin</div>
                        <div class="demo-pass">•••••••</div>
                    </div>
                    <div class="demo-item" onclick="fillCredentials('accountant', 'acc123')">
                        <div class="demo-role"><i class="fas fa-calculator"></i> المحاسب</div>
                        <div class="demo-user">accountant</div>
                        <div class="demo-pass">••••••</div>
                    </div>
                    <div class="demo-item" onclick="fillCredentials('booking', 'book123')">
                        <div class="demo-role"><i class="fas fa-calendar-alt"></i> الحجوزات</div>
                        <div class="demo-user">booking</div>
                        <div class="demo-pass">•••••••</div>
                    </div>
                    <div class="demo-item" onclick="fillCredentials('viewer1', 'view123')">
                        <div class="demo-role"><i class="fas fa-eye"></i> مشاهد</div>
                        <div class="demo-user">viewer1</div>
                        <div class="demo-pass">•••••••</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="footer">
        <i class="fas fa-copyright"></i> 2025 Scientific Center | نظام إدارة متكامل
    </div>

    <script>
        // ⚠️ IMPORTANT: Change this URL to your Google Apps Script Web App URL
        // After deploying your code.gs as a Web App, copy the URL and paste it here
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwIqJ0hC7xzs4I6--ocDyCHkwxwmVUk-Y0eOwYsTUCiP39MH2oetro_9ssGTniJOztRjw/exec';

        function fillCredentials(username, password) {
            document.getElementById('username').value = username;
            document.getElementById('password').value = password;
        }

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const loginBtn = document.getElementById('loginBtn');
            const loading = document.getElementById('loading');
            const errorDiv = document.getElementById('errorMessage');
            
            if (!username || !password) {
                showToast('الرجاء إدخال اسم المستخدم وكلمة المرور', 'warning');
                return;
            }
            
            loginBtn.disabled = true;
            loading.classList.add('show');
            errorDiv.classList.remove('show');
            
            try {
                // استخدام GET method عشان نتجنب CORS
                const url = `${SCRIPT_URL}?action=login&username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}`;
                const response = await fetch(url);
                const result = await response.json();
                
                if (result.success) {
                    sessionStorage.setItem('loggedInUser', JSON.stringify(result.user));
                    loginBtn.innerHTML = '<i class="fas fa-check"></i><span>تم الدخول...</span>';
                    loginBtn.style.background = 'linear-gradient(135deg, #2ecc71, #27ae60)';
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 800);
                } else {
                    showToast(result.message || 'اسم المستخدم أو كلمة المرور غير صحيحة', 'error');
                    resetLoginButton();
                }
            } catch (error) {
                console.error('Error:', error);
                showToast('حدث خطأ في الاتصال بالخادم. تأكدي من نشر الـ Web App بشكل صحيح', 'error');
                resetLoginButton();
            }
            
            function resetLoginButton() {
                loginBtn.disabled = false;
                loading.classList.remove('show');
            }
            
            function showToast(message, type = 'info') {
                const container = document.getElementById('toastContainer');
                const icons = { success: 'fa-check-circle', error: 'fa-exclamation-circle', warning: 'fa-exclamation-triangle', info: 'fa-info-circle' };
                const toast = document.createElement('div');
                toast.className = `toast toast-${type}`;
                toast.innerHTML = `<i class="fas ${icons[type] || icons.info}"></i><span>${message}</span>`;
                container.appendChild(toast);
                setTimeout(() => toast.remove(), 4000);
            }
        });
        
        document.getElementById('username').focus();
    </script>
<script src="sidebar.js"></script>
</body>
</html>
